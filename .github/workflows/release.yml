name: Release

# Cuts prebuilt binaries whenever you push a version tag, e.g.:
#   git tag v0.1.3 && git push origin v0.1.3
# Each job builds `cerebrum` natively on its OS/arch and attaches the
# tarball to the GitHub Release for that tag. install.sh then just
# downloads the right one — no compiling on the user's machine.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: # lets you run it by hand from the Actions tab

permissions:
  contents: write # required to create/upload to the Release

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14 # Apple Silicon
            target: aarch64-apple-darwin
          - os: macos-13 # Intel Mac
            target: x86_64-apple-darwin
          - os: ubuntu-latest # Linux x64
            target: x86_64-unknown-linux-gnu

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package tarball
        shell: bash
        run: |
          BIN=cerebrum
          DIR="cerebrum-${{ matrix.target }}"
          mkdir "$DIR"
          cp "target/${{ matrix.target }}/release/$BIN" "$DIR/"
          cp README.md LICENSE* "$DIR/" 2>/dev/null || true
          tar -czf "$DIR.tar.gz" "$DIR"
          shasum -a 256 "$DIR.tar.gz" > "$DIR.tar.gz.sha256"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            cerebrum-${{ matrix.target }}.tar.gz
            cerebrum-${{ matrix.target }}.tar.gz.sha256
          fail_on_unmatched_files: true
